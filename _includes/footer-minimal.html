<footer class="footer-min">
  <div class="text-muted">
    {% assign site_author_name = site.author.name | default: site.author %}
    {% if site_author_name %}
      {{ site_author_name }}
      &nbsp;&nbsp;&bull;&nbsp;&nbsp;
    {% endif %}
    {% if page.date %}
      {{ page.date }}
    {% else %}
      {{ site.time | date: '%Y' }}
    {% endif %}

    {% if site.url-pretty %}
      &nbsp;&nbsp;&bull;&nbsp;&nbsp;
      <a href="{{ '/' | absolute_url }}">{{ site.url-pretty }}</a>
    {% endif %}
  </div>
</footer>
