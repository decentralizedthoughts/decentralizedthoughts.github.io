{% if site.post_search %}

<div id="beautifuljekyll-search-overlay" data-search-json="{{ '/assets/data/searchcorpus.json' | relative_url }}">

  <div id="nav-search-exit" title="Exit search">✕</div>
  <input type="text" id="nav-search-input" placeholder="Search posts and pages" autocomplete="off">
  <p id="nav-search-status">Type at least 2 characters to search.</p>
  <ul id="search-results-container"></ul>
</div>

{% endif %}
