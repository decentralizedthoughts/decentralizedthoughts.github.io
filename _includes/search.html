{% if site.post_search %}

<div id="beautifuljekyll-search-overlay" data-search-json="{{ '/assets/data/searchcorpus.json' | relative_url }}" aria-hidden="true">
  <div class="search-overlay-backdrop" data-search-close></div>
  <div class="search-dialog" role="dialog" aria-modal="true" aria-labelledby="nav-search-heading">
    <div class="search-dialog-header">
      <p class="search-dialog-kicker">Search the archive</p>
      <button id="nav-search-exit" type="button" title="Close search" aria-label="Close search">Close</button>
    </div>
    <label class="sr-only" id="nav-search-heading" for="nav-search-input">Search posts, authors, topics, and phrases</label>
    <div class="search-input-shell">
      <span class="fa fa-search" aria-hidden="true"></span>
      <input type="text" id="nav-search-input" placeholder="Search posts, authors, topics, and phrases" autocomplete="off">
      <span class="search-shortcut">/</span>
    </div>
    <p id="nav-search-status">Search by title, author, tag, or a phrase from the post.</p>
    <div id="search-discovery">
      <section class="search-discovery-group" aria-labelledby="search-popular-heading">
        <p class="search-discovery-heading" id="search-popular-heading">Popular topics</p>
        <div id="search-suggestions" aria-label="Popular topics"></div>
      </section>
      <section class="search-discovery-group" aria-labelledby="search-recent-heading">
        <p class="search-discovery-heading" id="search-recent-heading">Recent posts</p>
        <div id="search-recent-posts"></div>
      </section>
    </div>
    <ul id="search-results-container"></ul>
  </div>
</div>

{% endif %}
