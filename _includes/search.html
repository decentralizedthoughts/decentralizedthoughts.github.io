{% if site.post_search %}

<div id="beautifuljekyll-search-overlay" data-search-json="{{ '/assets/data/searchcorpus.json' | relative_url }}">

  <div id="nav-search-exit" title="Exit search">✕</div>
  <input type="text" id="nav-search-input" placeholder="Search posts, authors, and topics" autocomplete="off">
  <p id="nav-search-status">Start typing or pick a topic below.</p>
  <div id="search-suggestions"></div>
  <ul id="search-results-container"></ul>
</div>

{% endif %}
