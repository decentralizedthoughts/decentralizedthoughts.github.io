name: Refresh GA Top Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"
    - cron: "17 18 * * *"

permissions:
  contents: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check GA configuration
        id: ga-config
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
        run: |
          if [ -z "$GA4_PROPERTY_ID" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$GCP_WORKLOAD_IDENTITY_PROVIDER" ] || [ -z "$GCP_SERVICE_ACCOUNT_EMAIL" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"
      - uses: ruby/setup-ruby@v1
        if: steps.ga-config.outputs.configured == 'true'
        with:
          ruby-version: "3.1"
      - id: auth
        if: steps.ga-config.outputs.configured == 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/analytics.readonly
      - name: Refresh top pages
        if: steps.ga-config.outputs.configured == 'true'
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA4_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          GA4_START_DATE: 14daysAgo
          GA4_END_DATE: yesterday
        run: ruby tools/fetch_ga_top_pages.rb
      - name: Commit updated top pages
        if: steps.ga-config.outputs.configured == 'true'
        run: |
          if git diff --quiet -- assets/data/top-pages.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/top-pages.json
          git commit -m "Data: refresh GA top pages"
          git push
