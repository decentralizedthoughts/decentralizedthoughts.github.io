name: build

on:
  pull_request:
  push:
    branches:
      - master
      - upgrade

jobs:
  jekyll-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '2.6'
          bundler-cache: true

      - name: Build site
        env:
          JEKYLL_ENV: production
          PAGES_REPO_NWO: decentralizedthoughts/decentralizedthoughts.github.io
        run: |
          bundle exec jekyll build --trace
